name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  integration:
    name: End-to-end drift detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false  # wrapper swallows exit codes; we need real exit codes for drift detection

      - name: Build terrawatch
        run: go build -o terrawatch .

      - name: Terraform init + apply (establish baseline state)
        working-directory: testdata/workspace
        run: |
          terraform init
          terraform apply -auto-approve -var="instance_count=1"

      - name: Introduce drift (change instance_count to 2)
        working-directory: testdata/workspace
        run: echo 'instance_count = 2' > terraform.tfvars

      - name: Write terrawatch config
        run: |
          cat > terrawatch-test.yaml <<EOF
          stacks:
            - name: test-stack
              path: ./testdata/workspace
              vars_file: terraform.tfvars
          github:
            repo: ${{ github.repository }}
            base_branch: main
            labels:
              - drift
              - integration-test
          EOF

      - name: Dry-run detect (validates drift detection without creating a PR)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(./terrawatch detect --config terrawatch-test.yaml --dry-run 2>&1 || true)
          echo "$OUTPUT"
          if ! echo "$OUTPUT" | grep -q "drift detected"; then
            echo "FAIL: expected drift to be detected"
            exit 1
          fi
          echo "PASS: drift detected correctly"

      - name: Full detect — create PR (requires repo setting or PAT)
        # To enable: Settings → Actions → General → Allow GitHub Actions to create and approve pull requests
        # Or add a PAT as secret TERRAWATCH_PAT with repo + pull-requests scope
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.TERRAWATCH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(./terrawatch detect --config terrawatch-test.yaml 2>&1 || true)
          echo "$OUTPUT"
          PR_URL=$(echo "$OUTPUT" | grep -oE 'https://github\.com/[^[:space:]]+' || true)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Verify PR was created
        if: steps.detect.outputs.pr_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.TERRAWATCH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr view "${{ steps.detect.outputs.pr_url }}" --json title,state | jq .

      - name: Cleanup — close PR and delete branch
        if: always() && steps.detect.outputs.pr_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.TERRAWATCH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr close "${{ steps.detect.outputs.pr_url }}" --delete-branch || true

      - name: Reset tfvars
        if: always()
        working-directory: testdata/workspace
        run: echo 'instance_count = 1' > terraform.tfvars
