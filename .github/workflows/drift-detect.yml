name: Drift Detection

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI
    inputs:
      dry_run:
        description: "Dry run (no PR created)"
        type: boolean
        default: false

permissions:
  contents: write           # create branches and files
  pull-requests: write      # open PRs

jobs:
  detect:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false  # wrapper swallows exit codes; we need real exit codes for drift detection

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install terrawatch
        run: go install github.com/MaripeddiSupraj/terrawatch@latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
        # Remove this step if you use GCP or Azure — add the equivalent action

      - name: Run drift detection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          terrawatch detect --config terrawatch.yaml $FLAGS
